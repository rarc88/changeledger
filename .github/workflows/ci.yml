name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: verify (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [24, 26]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node bin/sl.mjs register
      - run: pnpm verify

  tarball:
    name: tarball smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Pack the exact published artifact and install it in an isolated dir, so
      # we exercise what npm users get — not the working tree.
      - run: pnpm pack --pack-destination /tmp
      - name: install the tarball in isolation and smoke-test the CLI
        run: |
          set -euo pipefail
          mkdir -p /tmp/smoke && cd /tmp/smoke
          npm init -y >/dev/null
          npm install /tmp/rarc88-spec-ledger-*.tgz
          printf '# Rules\n' > AGENTS.md
          ./node_modules/.bin/sl --help
          ./node_modules/.bin/sl init
          ./node_modules/.bin/sl check
